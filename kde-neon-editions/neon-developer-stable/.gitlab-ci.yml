# KDE Neon Developer Edition (Stable) — GitLab CI Pipeline
# Upstream: gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon  branch: Neon/stable
# Archive:  archive.neon.kde.org/dev/stable

include:
  - project: 'openos-project/kde-ecosystem-deving/kde-groups/neon/ci-templates'
    ref: main
    file:
      - '/iso-build.yml'
      - '/mirror-sync.yml'
      - '/manifest-validate.yml'

variables:
  EDITION: "developer-stable"
  NEON_BRANCH: "Neon/stable"
  UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
  UPSTREAM_BRANCH: "Neon/stable"
  UBUNTU_SERIES: "noble"
  NEON_ARCHIVE: "http://archive.neon.kde.org/dev/stable"
  NEON_ARCHIVE_KEY: "0x45F4C354638D1F29"

stages:
  - sync
  - validate
  - build-iso
  - publish

sync-upstream:
  extends: .mirror-sync-base
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/stable"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

validate-manifest:
  extends: .manifest-validate-base
  variables:
    EDITION: "developer-stable"

build-developer-stable-iso:
  extends: .iso-build-base
  variables:
    EDITION: "developer-stable"
    NEON_BRANCH: "Neon/stable"
    UBUNTU_SERIES: "noble"
    NEON_ARCHIVE: "http://archive.neon.kde.org/dev/stable"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "schedule"

publish-developer-stable-iso:
  extends: .iso-publish-base
  needs:
    - build-developer-stable-iso
  variables:
    EDITION: "developer-stable"
    PUBLISH_PATH: "neon/developer-stable"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
