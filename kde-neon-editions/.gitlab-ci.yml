# KDE Neon Editions — Root Orchestration Pipeline
#
# This pipeline lives in the parent group and triggers all four edition
# pipelines in parallel. Use it for:
#   - Nightly scheduled builds of all four ISOs
#   - Manual "build everything" runs after a major KDE release
#
# Each edition repo has its own pipeline for day-to-day work.

stages:
  - lint           # manifest validation, shellcheck, CI YAML syntax
  - sync-all       # pull latest from kde-groups/neon across all editions
  - build-all      # trigger all four ISO builds in parallel
  - report         # collect results and post a summary

variables:
  GITLAB_GROUP: "openos-project/kde-ecosystem-deving/neon-deving"

# ── Lint ──────────────────────────────────────────────────────────────────────

lint-manifests:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install pyyaml --quiet
  script:
    - |
      ERRORS=0
      for EDITION_DIR in kde-neon-editions/neon-user kde-neon-editions/neon-testing kde-neon-editions/neon-developer-stable kde-neon-editions/neon-developer-unstable; do
        MANIFEST=$(ls ${EDITION_DIR}/manifests/*.yaml | head -1)
        echo "==> Validating ${MANIFEST}"
        python3 kde-neon-editions/ci-templates/scripts/validate-manifest.py "${MANIFEST}" || ERRORS=$((ERRORS+1))
      done
      exit ${ERRORS}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

lint-shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  script:
    - |
      echo "==> Running shellcheck on ci-templates/scripts/"
      ERRORS=0
      find kde-neon-editions/ci-templates/scripts -name "*.sh" ! -type l | sort | while read -r SCRIPT; do
        echo "    ${SCRIPT}"
        shellcheck --severity=warning --shell=bash "${SCRIPT}" || ERRORS=$((ERRORS+1))
      done
      exit ${ERRORS}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

lint-ci-yaml:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3
  script:
    - |
      echo "==> Linting all .gitlab-ci.yml files via GitLab API"
      ERRORS=0
      for CI_FILE in \
        kde-neon-editions/.gitlab-ci.yml \
        kde-neon-editions/neon-user/.gitlab-ci.yml \
        kde-neon-editions/neon-testing/.gitlab-ci.yml \
        kde-neon-editions/neon-developer-stable/.gitlab-ci.yml \
        kde-neon-editions/neon-developer-unstable/.gitlab-ci.yml; do
        echo "--- ${CI_FILE} ---"
        RESPONSE=$(curl -s \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --request POST \
          "${CI_API_V4_URL}/ci/lint" \
          --data "{\"content\": $(python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))' < "${CI_FILE}")}")
        STATUS=$(echo "${RESPONSE}" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
        if [ "${STATUS}" = "valid" ]; then
          echo "    valid"
        else
          echo "    INVALID: $(echo "${RESPONSE}" | grep -o '"errors":\[[^]]*\]')"
          ERRORS=$((ERRORS+1))
        fi
      done
      exit ${ERRORS}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

# ── Upstream sync (all editions) ──────────────────────────────────────────────

.sync-edition: &sync-edition
  stage: sync-all
  image: alpine/git:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

sync-neon-user:
  <<: *sync-edition
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/release"
    EDITION: "user"
  script:
    - git remote add upstream "${UPSTREAM_REPO_URL}" 2>/dev/null || true
    - git fetch upstream "${UPSTREAM_BRANCH}" --depth=50
    - echo "Upstream Neon/release fetched for user edition"

sync-neon-testing:
  <<: *sync-edition
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/release"
    EDITION: "testing"
  script:
    - git remote add upstream "${UPSTREAM_REPO_URL}" 2>/dev/null || true
    - git fetch upstream "${UPSTREAM_BRANCH}" --depth=50
    - echo "Upstream Neon/release fetched for testing edition"

sync-neon-developer-stable:
  <<: *sync-edition
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/stable"
    EDITION: "developer-stable"
  script:
    - git remote add upstream "${UPSTREAM_REPO_URL}" 2>/dev/null || true
    - git fetch upstream "${UPSTREAM_BRANCH}" --depth=50
    - echo "Upstream Neon/stable fetched for developer-stable edition"

sync-neon-developer-unstable:
  <<: *sync-edition
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/unstable"
    EDITION: "developer-unstable"
  script:
    - git remote add upstream "${UPSTREAM_REPO_URL}" 2>/dev/null || true
    - git fetch upstream "${UPSTREAM_BRANCH}" --depth=50
    - echo "Upstream Neon/unstable fetched for developer-unstable edition"

# ── Trigger per-edition pipelines in parallel ─────────────────────────────────

trigger-user-iso:
  stage: build-all
  needs:
    - sync-neon-user
  trigger:
    project: "${GITLAB_GROUP}/neon-user"
    branch: main
    strategy: depend   # wait for downstream pipeline to finish
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

trigger-testing-iso:
  stage: build-all
  needs:
    - sync-neon-testing
  trigger:
    project: "${GITLAB_GROUP}/neon-testing"
    branch: main
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

trigger-developer-stable-iso:
  stage: build-all
  needs:
    - sync-neon-developer-stable
  trigger:
    project: "${GITLAB_GROUP}/neon-developer-stable"
    branch: main
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

trigger-developer-unstable-iso:
  stage: build-all
  needs:
    - sync-neon-developer-unstable
  trigger:
    project: "${GITLAB_GROUP}/neon-developer-unstable"
    branch: main
    strategy: depend
  allow_failure: true   # unstable builds may fail by design
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# ── Build summary ─────────────────────────────────────────────────────────────

build-report:
  stage: report
  image: alpine:latest
  needs:
    - trigger-user-iso
    - trigger-testing-iso
    - trigger-developer-stable-iso
    - job: trigger-developer-unstable-iso
      optional: true
  script:
    - |
      echo "========================================"
      echo "  KDE Neon Edition Build Summary"
      echo "  $(date -u '+%Y-%m-%d %H:%M UTC')"
      echo "========================================"
      echo "  User Edition:              ${TRIGGER_USER_ISO_STATUS:-triggered}"
      echo "  Testing Edition:           ${TRIGGER_TESTING_ISO_STATUS:-triggered}"
      echo "  Developer Stable Edition:  ${TRIGGER_DEVELOPER_STABLE_ISO_STATUS:-triggered}"
      echo "  Developer Unstable Edition:${TRIGGER_DEVELOPER_UNSTABLE_ISO_STATUS:-triggered (may fail)}"
      echo "========================================"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
