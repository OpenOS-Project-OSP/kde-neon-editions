# KDE Neon Developer Edition (Unstable) — GitLab CI Pipeline
# Upstream: gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon  branch: Neon/unstable
# Archive:  archive.neon.kde.org/dev/unstable
# Note: builds from KDE master — expected to fail occasionally

include:
  - project: 'openos-project/kde-ecosystem-deving/neon-deving/kde-neon-editions'
    ref: main
    file:
      - '/ci-templates/iso-build.yml'
      - '/ci-templates/mirror-sync.yml'
      - '/ci-templates/manifest-validate.yml'
      - '/ci-templates/lint.yml'

variables:
  EDITION: "developer-unstable"
  NEON_BRANCH: "Neon/unstable"
  UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
  UPSTREAM_BRANCH: "Neon/unstable"
  UBUNTU_SERIES: "noble"
  NEON_ARCHIVE: "http://archive.neon.kde.org/dev/unstable"
  NEON_ARCHIVE_KEY: "0x45F4C354638D1F29"

stages:
  - lint
  - sync
  - validate
  - build-iso
  - publish

# ── Lint ─────────────────────────────────────────────────────────────────────

lint-manifest:
  extends: .lint-manifest-base
  variables:
    EDITION: "developer-unstable"

lint-shellcheck:
  extends: .lint-shellcheck-base

lint-ci-yaml:
  extends: .lint-ci-yaml-base

sync-upstream:
  extends: .mirror-sync-base
  variables:
    UPSTREAM_REPO_URL: "https://gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon/neon/seeds.git"
    UPSTREAM_BRANCH: "Neon/unstable"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

validate-manifest:
  extends: .manifest-validate-base
  variables:
    EDITION: "developer-unstable"

build-developer-unstable-iso:
  extends: .iso-build-base
  variables:
    EDITION: "developer-unstable"
    NEON_BRANCH: "Neon/unstable"
    UBUNTU_SERIES: "noble"
    NEON_ARCHIVE: "http://archive.neon.kde.org/dev/unstable"
  # Unstable builds are allowed to fail — master branch is not guaranteed stable
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "schedule"

publish-developer-unstable-iso:
  extends: .iso-publish-base
  needs:
    - job: build-developer-unstable-iso
      optional: true   # publish whatever built, even if partial
  variables:
    EDITION: "developer-unstable"
    PUBLISH_PATH: "neon/developer-unstable"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
