# KDE Neon Developer Edition (Unstable) — package manifest
# Tracks: Neon/unstable branch on gitlab.com/openos-project/kde-ecosystem-deving/kde-groups/neon
# Archive: http://archive.neon.kde.org/dev/unstable
# Built from: KDE master branch (git HEAD) — may be broken at any time

edition: developer-unstable
upstream_branch: Neon/unstable
ubuntu_series: noble
neon_archive: http://archive.neon.kde.org/dev/unstable
neon_archive_key: 0x45F4C354638D1F29
source_group: openos-project/kde-ecosystem-deving/kde-groups/neon/neon

# Warning surfaced in ISO boot menu and installer
edition_warning: >
  This is a development snapshot built from KDE master branches.
  It may be unstable, incomplete, or unbootable. Not for production use.

base_packages:
  - ubuntu-minimal
  - ubuntu-standard
  - casper
  - lupin-casper
  - discover
  - os-prober
  - grub-common
  - grub2-common
  - grub-pc
  - grub-efi-amd64-signed
  - shim-signed
  - plymouth
  - plymouth-theme-breeze

plasma_packages:
  - plasma-desktop
  - plasma-workspace
  - plasma-nm
  - plasma-pa
  - plasma-systemmonitor
  - plasma-thunderbolt
  - plasma-vault
  - plasma-browser-integration
  - kscreen
  - kinfocenter
  - ksystemstats
  - powerdevil
  - bluedevil
  - breeze
  - breeze-gtk-theme
  - breeze-plymouth
  - sddm
  - sddm-theme-breeze
  - kde-config-sddm

# No pin — always latest from master
frameworks_pin: null

application_packages:
  - dolphin
  - konsole
  - kate
  - gwenview
  - okular
  - spectacle
  - ark
  - kcalc
  - kwrite
  - elisa
  - kdeconnect
  - filelight
  - ksystemlog
  - partitionmanager
  - plasma-discover
  - plasma-discover-backend-flatpak
  - plasma-discover-backend-snap

neon_packages:
  - neon-desktop
  - neon-settings
  - neon-keyring

developer_extras:
  - build-essential
  - cmake
  - extra-cmake-modules
  - ninja-build
  - clang
  - clang-format
  - clang-tidy
  - gdb
  - valgrind
  - heaptrack
  - hotspot
  - kdevelop
  - umbrello
  - git
  - git-cola
  - gitk
  - flatpak
  - flatpak-builder
  - appstream-util
  - lintian
  - debhelper
  - devscripts
  - dput
  - pbuilder
  - sbuild
  - quilt
  - python3-pip
  - python3-venv
  - drkonqi
  - apport
  # Extra debug symbols for master builds
  - libkf6-dbgsym
  - plasma-workspace-dbgsym

installer_packages:
  - calamares
  - calamares-settings-neon

exclude: []
