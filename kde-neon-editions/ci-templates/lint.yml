# Reusable lint job templates
# Include this in any edition repo with:
#   include:
#     - project: 'openos-project/kde-ecosystem-deving/neon-deving/kde-neon-editions'
#       ref: main
#       file: '/ci-templates/lint.yml'

# ── Manifest validation ───────────────────────────────────────────────────────

.lint-manifest-base:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install pyyaml --quiet
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - . scripts/bootstrap-scripts.sh
  script:
    - python3 "${SCRIPTS_DIR}/validate-manifest.py" "manifests/${EDITION}.yaml"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ── Shell script linting ──────────────────────────────────────────────────────

.lint-shellcheck-base:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  before_script:
    - . scripts/bootstrap-scripts.sh
  script:
    - |
      echo "==> Running shellcheck on all scripts in ${SCRIPTS_DIR}"
      find "${SCRIPTS_DIR}" -name "*.sh" | sort | while read -r SCRIPT; do
        echo "    Checking: ${SCRIPT}"
        shellcheck --severity=warning --shell=bash "${SCRIPT}"
      done
      echo "==> shellcheck passed"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ── GitLab CI YAML lint ───────────────────────────────────────────────────────

.lint-ci-yaml-base:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache curl git python3
    - . scripts/bootstrap-scripts.sh
  script:
    - |
      echo "==> Linting .gitlab-ci.yml via GitLab API"
      CONTENT=$(cat .gitlab-ci.yml)
      RESPONSE=$(curl -s \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/ci/lint" \
        --data "{\"content\": $(echo "${CONTENT}" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}")
      VALID=$(echo "${RESPONSE}" | python3 -c "import json,sys; r=json.load(sys.stdin); print(str(r.get('valid',False)).lower())" 2>/dev/null || echo "false")
      if [ "${VALID}" = "true" ]; then
        echo "    .gitlab-ci.yml is valid"
      else
        echo "    Errors:"
        echo "${RESPONSE}" | python3 -c "import json,sys; r=json.load(sys.stdin); [print('   ',e) for e in r.get('errors',[])] or print(sys.stdin)" 2>/dev/null || echo "${RESPONSE}"
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
