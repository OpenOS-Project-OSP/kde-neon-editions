# Reusable ISO build job template
# Include this in any edition repo with:
#   include:
#     - project: 'openos-project/kde-ecosystem-deving/neon-deving/kde-neon-editions'
#       ref: main
#       file: '/ci-templates/iso-build.yml'

.iso-build-base:
  stage: build-iso
  image: ubuntu:noble
  tags:
    - privileged  # live-build requires root/privileged runner
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        live-build
        ubuntu-defaults-builder
        debootstrap
        squashfs-tools
        xorriso
        isolinux
        syslinux-common
        grub-efi-amd64-bin
        grub-pc-bin
        mtools
        dosfstools
        rsync
        wget
        curl
        gpg
        ca-certificates
        python3
        python3-yaml
  script:
    - ./scripts/build-iso.sh
  after_script:
    - ./scripts/checksum-iso.sh
  artifacts:
    name: "${EDITION}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*.iso"
      - "*.iso.sha256"
      - "*.iso.sig"
    expire_in: 7 days
  cache:
    key: "debootstrap-${UBUNTU_SERIES}"
    paths:
      - .cache/debootstrap/

.iso-publish-base:
  stage: publish
  image: alpine:latest
  before_script:
    - apk add --no-cache curl openssh-client
  script:
    - ./scripts/publish-iso.sh
  rules:
    - if: $CI_COMMIT_BRANCH == $NEON_BRANCH && $CI_PIPELINE_SOURCE == "schedule"
